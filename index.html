<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Meu Treino</title>

<!-- PWA / instalar na tela inicial -->
<link rel="manifest" href="./manifest.webmanifest">
<meta name="theme-color" content="#0f1115">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Treino">
<link rel="apple-touch-icon" href="./apple-touch-icon.png">
<link rel="icon" type="image/png" href="./icon-192.png">

<style>
  :root {
    --bg: #0b0d12;
    --surface: #14171e;
    --surface2: #1d212a;
    --border: #2a2f3a;
    --text: #f1f3f7;
    --muted: #8d94a1;
    --accent: #5fd0a8;
    --accent-ink: #06231c;
    --accent-dark: #12715a;
    --danger: #e8595a;
    --radius: 14px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 28px;
    font-size: 16px;
  }
  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(11,13,18,0.85); backdrop-filter: saturate(140%) blur(12px); -webkit-backdrop-filter: saturate(140%) blur(12px);
    padding: 16px 16px 13px;
    border-bottom: 0.5px solid var(--border);
  }
  header .head-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; max-width: 600px; margin: 0 auto; }
  .brand { display: flex; align-items: center; gap: 11px; }
  .logo { width: 38px; height: 38px; border-radius: 11px; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo svg { width: 22px; height: 22px; display: block; }
  header h1 { margin: 0; font-size: 21px; font-weight: 700; letter-spacing: -0.02em; }
  header p { margin: 2px 0 0; font-size: 13px; color: var(--muted); }
  .backup-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .backup-actions button {
    background: var(--surface); border: 0.5px solid var(--border); color: var(--muted);
    border-radius: 8px; padding: 6px 10px; font-size: 12px; cursor: pointer;
  }
  .backup-actions button:active { background: var(--border); }
  #acctBtn.on { background: var(--accent); color: #04342c; border-color: var(--accent); }
  .acct-modal { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 50; padding: 20px; }
  .acct-box { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 20px; width: 100%; max-width: 340px; }
  .acct-box h3 { margin: 0 0 4px; font-size: 17px; }
  .acct-close { float: right; background: none; border: none; color: var(--muted); font-size: 22px; cursor: pointer; line-height: 1; }
  .acct-msg { color: var(--text); font-size: 14px; margin: 10px 0; }
  .acct-hint { color: var(--muted); font-size: 12px; margin: 10px 0; }
  .acct-status { color: var(--accent); font-size: 13px; font-weight: 600; min-height: 16px; margin: 6px 0; }
  .acct-box input { width: 100%; box-sizing: border-box; background: var(--bg); border: 0.5px solid var(--border); color: var(--text); border-radius: 9px; padding: 12px; font-size: 15px; margin-bottom: 8px; }
  .acct-btn { width: 100%; background: var(--accent); color: #04342c; border: none; border-radius: 9px; padding: 12px; font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; }
  .acct-btn.ghost { background: transparent; color: var(--muted); border: 0.5px solid var(--border); }
  .container { padding: 12px 16px; max-width: 600px; margin: 0 auto; }

  .group-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
  }
  .group-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; cursor: pointer; user-select: none;
  }
  .group-head .left { display: flex; align-items: center; gap: 10px; }
  .group-head h2 { margin: 0; font-size: 17px; font-weight: 600; }
  .group-head .count { font-size: 13px; color: var(--muted); }
  .chevron { transition: transform .2s; color: var(--muted); font-size: 20px; }
  .group-card.open .chevron { transform: rotate(90deg); }
  .group-body { display: none; padding: 0 16px 12px; }
  .group-card.open .group-body { display: block; }

  .exercise {
    background: var(--surface2);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .ex-head { display: flex; align-items: center; justify-content: space-between; }
  .ex-name { font-weight: 600; font-size: 15px; }
  .ex-last { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .ex-actions { display: flex; gap: 6px; }
  .icon-btn {
    background: none; border: none; color: var(--muted);
    font-size: 18px; padding: 4px 6px; cursor: pointer; border-radius: 6px;
  }
  .icon-btn:active { background: var(--border); }

  .log-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr auto;
    gap: 8px; align-items: center; margin-top: 10px;
  }
  .log-row input {
    width: 100%; background: var(--bg); border: 0.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 8px; font-size: 15px;
    text-align: center; -moz-appearance: textfield;
  }
  .log-row input::-webkit-outer-spin-button,
  .log-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .log-row input::placeholder { color: var(--muted); font-size: 12px; }
  .note-input {
    width: 100%; background: var(--bg); border: 0.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 10px; font-size: 14px;
    margin-top: 8px; resize: none; font-family: inherit;
  }
  .save-btn {
    background: var(--accent); color: var(--accent-ink); border: none;
    border-radius: 10px; padding: 0 14px; height: 42px; font-size: 15px;
    font-weight: 700; cursor: pointer; white-space: nowrap; letter-spacing: -0.01em;
  }
  .save-btn:active { transform: scale(.985); opacity: .9; }
  input:focus, textarea:focus {
    outline: none; border-color: var(--accent) !important;
    box-shadow: 0 0 0 3px rgba(95,208,168,.16);
  }

  .history { margin-top: 10px; border-top: 0.5px solid var(--border); padding-top: 8px; }
  .hist-item {
    display: flex; justify-content: space-between; align-items: flex-start;
    font-size: 13px; padding: 5px 0; gap: 8px;
  }
  .hist-item .date { color: var(--muted); min-width: 64px; }
  .hist-item .val { flex: 1; }
  .hist-item .note { color: var(--muted); font-style: italic; }
  .hist-del { color: var(--muted); background: none; border: none; cursor: pointer; font-size: 14px; }

  .chart-wrap { margin-top: 12px; }
  .chart-wrap canvas { width: 100% !important; height: 140px !important; }
  .chart-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; }

  .add-ex {
    display: flex; gap: 8px; margin-top: 4px;
  }
  .add-ex input {
    flex: 1; background: var(--bg); border: 0.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 10px; font-size: 14px;
  }
  .add-ex button {
    background: var(--surface2); color: var(--accent); border: 0.5px solid var(--border);
    border-radius: 8px; padding: 0 16px; font-size: 20px; cursor: pointer;
  }

  .fab-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 0.5px solid var(--border);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex; gap: 8px; max-width: 600px; margin: 0 auto;
  }
  .fab-bar input {
    flex: 1; background: var(--surface); border: 0.5px solid var(--border);
    color: var(--text); border-radius: 10px; padding: 12px; font-size: 15px;
  }
  .fab-bar button {
    background: var(--accent); color: #04342c; border: none;
    border-radius: 10px; padding: 0 18px; font-weight: 700; font-size: 15px; cursor: pointer;
  }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; font-size: 14px; }

  .muscle-pick { margin-bottom: 14px; }
  .pick-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: .04em; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { background: var(--surface2); border: 0.5px solid var(--border); color: var(--text); border-radius: 20px; padding: 9px 15px; font-size: 14px; cursor: pointer; transition: background .15s, transform .1s; }
  .chip:active { transform: scale(.96); }
  .chip.on { background: var(--accent); border-color: var(--accent); color: var(--accent-ink); font-weight: 700; }
  .chip.add { background: var(--surface); color: var(--accent); border-style: dashed; }

  .add-type { margin-top: 22px; padding-top: 18px; border-top: 0.5px solid var(--border); }
  .new-type { margin-top: 12px; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 12px; }
  .new-type input { width: 100%; background: var(--bg); border: 0.5px solid var(--border); color: var(--text); border-radius: 8px; padding: 11px; font-size: 14px; }
  .new-type .row2 { display: flex; gap: 8px; margin-top: 8px; }
  .kind-badge { font-size: 10px; padding: 2px 7px; border-radius: 8px; background: rgba(95,208,168,.15); color: var(--accent); margin-left: 6px; vertical-align: 1px; }
  .time-row { display: flex; align-items: center; gap: 10px; margin-top: 12px; }
  .time-row input { flex: 1; background: var(--bg); border: 0.5px solid var(--border); color: var(--text); border-radius: 8px; padding: 12px; font-size: 17px; text-align: center; -moz-appearance: textfield; }
  .time-row input::-webkit-outer-spin-button, .time-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .time-unit { color: var(--muted); font-size: 15px; }

  .series-control {
    display: flex; align-items: center; gap: 10px; margin-top: 10px;
    font-size: 14px; color: var(--muted);
  }
  .stepper { display: flex; align-items: center; gap: 0; }
  .stepper button {
    width: 32px; height: 32px; background: var(--bg); border: 0.5px solid var(--border);
    color: var(--text); font-size: 18px; cursor: pointer;
  }
  .stepper button:first-child { border-radius: 8px 0 0 8px; }
  .stepper button:last-child { border-radius: 0 8px 8px 0; }
  .stepper .num {
    min-width: 38px; height: 32px; display: flex; align-items: center; justify-content: center;
    background: var(--surface); border-top: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border);
    font-weight: 600; color: var(--text);
  }
  .set-line {
    display: grid; grid-template-columns: 24px 1fr 1fr; gap: 8px;
    align-items: center; margin-top: 8px;
  }
  .set-line .set-idx { font-size: 13px; color: var(--muted); text-align: center; }
  .set-line input {
    width: 100%; background: var(--bg); border: 0.5px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 8px; font-size: 15px;
    text-align: center; -moz-appearance: textfield;
  }
  .set-line input::-webkit-outer-spin-button,
  .set-line input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .set-head { display: grid; grid-template-columns: 24px 1fr 1fr; gap: 8px; margin-top: 10px; }
  .set-head span { font-size: 11px; color: var(--muted); text-align: center; }

  .tabs {
    display: flex; gap: 4px; padding: 5px; margin: 12px 16px 0;
    background: var(--surface); border: 0.5px solid var(--border); border-radius: 13px;
  }
  @media (min-width: 600px) { .tabs { max-width: 568px; margin-left: auto; margin-right: auto; } }
  .tab {
    flex: 1; text-align: center; padding: 9px; border-radius: 9px; cursor: pointer;
    background: transparent; border: none; color: var(--muted);
    font-size: 14px; font-weight: 600; transition: color .15s, background .15s;
  }
  .tab.active { background: var(--accent); color: var(--accent-ink); }

  .day-card {
    background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 14px 16px; margin-bottom: 12px;
  }
  .day-card h3 { margin: 0 0 8px; font-size: 15px; font-weight: 600; }
  .day-card .day-sub { font-size: 12px; color: var(--muted); font-weight: 400; }
  .day-ex { font-size: 14px; padding: 6px 0; border-top: 0.5px solid var(--border); }
  .day-ex:first-of-type { border-top: none; }
  .day-ex .grp { color: var(--accent); font-size: 12px; }
  .day-ex .sets { color: var(--muted); font-size: 13px; }
  /* Hábitos */
  .habit-row { display:flex; flex-wrap:wrap; align-items:center; gap:10px; background:var(--surface); border:0.5px solid var(--border); border-radius:10px; padding:11px 12px; margin-bottom:8px; }
  .habit-row.compact { background:var(--surface2); padding:9px 10px; margin:6px 0 0; }
  .habit-row.off { opacity:0.6; }
  .habit-check { width:26px; height:26px; border-radius:7px; border:1.5px solid var(--border); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:15px; color:#04342c; font-weight:700; }
  .habit-check.done { background:var(--accent); border-color:var(--accent); }
  .habit-check.locked { cursor:default; opacity:0.4; }
  .day-chips { display:flex; gap:5px; flex-basis:100%; margin-top:2px; }
  .day-chips.add-chips { margin-top:10px; }
  .day-chip { flex:1; text-align:center; padding:6px 0; border-radius:7px; border:0.5px solid var(--border); background:var(--bg); color:var(--muted); font-size:11px; cursor:pointer; font-weight:600; user-select:none; }
  .day-chip.on { background:var(--accent); color:#04342c; border-color:var(--accent); }
  .day-presets { display:flex; gap:6px; margin-top:8px; }
  .day-presets button { flex:1; background:var(--bg); border:0.5px solid var(--border); color:var(--muted); border-radius:8px; padding:7px; font-size:12px; cursor:pointer; font-weight:600; }
  .habit-name { flex:1; font-size:15px; }
  .habit-badge { font-size:11px; padding:3px 9px; border-radius:10px; white-space:nowrap; }
  .habit-badge.do { background:rgba(93,202,165,0.15); color:var(--accent); }
  .habit-badge.avoid { background:rgba(226,75,74,0.15); color:var(--danger); }
  .streak { font-size:12px; color:#f0a35e; display:inline-flex; align-items:center; gap:2px; white-space:nowrap; font-weight:600; }
  .habit-add { margin-top:16px; background:var(--surface); border:0.5px solid var(--border); border-radius:12px; padding:12px; }
  .habit-add input { width:100%; background:var(--bg); border:0.5px solid var(--border); color:var(--text); border-radius:8px; padding:11px; font-size:14px; }
  .habit-add .row2 { display:flex; gap:8px; margin-top:8px; }
  .seg { display:flex; flex:1; }
  .seg button { flex:1; background:var(--bg); border:0.5px solid var(--border); color:var(--muted); padding:9px; font-size:13px; cursor:pointer; font-weight:600; }
  .seg button:first-child { border-radius:8px 0 0 8px; }
  .seg button:last-child { border-radius:0 8px 8px 0; border-left:none; }
  .seg button.on { background:var(--accent-dark); color:#fff; border-color:var(--accent-dark); }
  .seg button.on.avoid { background:var(--danger); border-color:var(--danger); }
  .add-habit-btn { background:var(--accent); color:#04342c; border:none; border-radius:8px; padding:0 20px; font-weight:700; font-size:18px; cursor:pointer; }

  /* Calendário */
  .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
  .cal-nav button { background:var(--surface); border:0.5px solid var(--border); color:var(--text); width:38px; height:38px; border-radius:9px; font-size:20px; cursor:pointer; }
  .cal-nav .month { font-size:15px; font-weight:600; }
  .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
  .cal-wd { text-align:center; font-size:11px; color:var(--muted); padding-bottom:2px; }
  .cal-cell { aspect-ratio:1/1; border-radius:9px; background:var(--surface2); border:1px solid transparent; display:flex; align-items:center; justify-content:center; cursor:pointer; position:relative; font-size:14px; }
  .cal-cell.empty { background:transparent; cursor:default; }
  .cal-cell.today { border-color:var(--muted); }
  .cal-cell.selected { border-color:var(--accent); background:var(--accent-dark); color:#fff; font-weight:700; }
  .cal-cell .wmark { position:absolute; top:5px; right:6px; width:6px; height:6px; border-radius:50%; background:var(--accent); }
  .cal-cell.selected .wmark { background:#fff; }
  .cal-cell .hbar { position:absolute; bottom:0; left:0; height:4px; background:var(--accent); border-radius:0 3px 3px 0; }
  .cal-cell.selected .hbar { background:#fff; opacity:.9; }
  .cal-legend { display:flex; gap:16px; margin-top:12px; font-size:12px; color:var(--muted); align-items:center; }
  .cal-legend span { display:inline-flex; align-items:center; gap:6px; }
  .lg-dot { width:7px; height:7px; border-radius:50%; background:var(--accent); display:inline-block; }
  .lg-bar { width:14px; height:4px; border-radius:2px; background:var(--accent); display:inline-block; }
  .detail-label { font-size:12px; color:var(--muted); margin:14px 0 2px; text-transform:uppercase; letter-spacing:.04em; }

  .app-ver { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: .03em; padding: 22px 0 6px; opacity: .65; }
  .group-card { border-radius: var(--radius); }
  .exercise { border-radius: 12px; }
  .save-btn, .add-habit-btn, .fab-bar button { transition: transform .1s, opacity .15s; }
  .fab-bar button:active, .add-habit-btn:active { transform: scale(.97); }

  /* Timers (Treino) */
  .timer-bar { display: flex; gap: 10px; padding: 12px 16px 0; max-width: 600px; margin: 0 auto; }
  .tmr { flex: 1; background: var(--surface); border: 0.5px solid var(--border); border-radius: 12px; padding: 10px 12px; min-width: 0; }
  .tmr-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .tmr-time { font-size: 27px; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -.02em; margin: 1px 0 8px; }
  .tmr-time.done { color: var(--accent); animation: tflash .45s ease-in-out 4; }
  @keyframes tflash { 50% { opacity: .2; } }
  .tmr-btn { width: 100%; background: var(--accent); color: var(--accent-ink); border: none; border-radius: 8px; padding: 9px; font-weight: 700; font-size: 14px; cursor: pointer; }
  .tmr-btn.on { background: var(--danger); color: #fff; }
  .rest-presets { display: flex; gap: 5px; }
  .rest-presets button { flex: 1; background: var(--bg); border: 0.5px solid var(--border); color: var(--text); border-radius: 7px; padding: 8px 0; font-size: 13px; font-weight: 600; cursor: pointer; min-width: 0; }
  .rest-presets button:active { background: var(--border); }

  .toast {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    background: var(--accent-dark); color: #fff; padding: 10px 18px;
    border-radius: 20px; font-size: 14px; opacity: 0; transition: opacity .3s;
    pointer-events: none; z-index: 50;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <div class="head-top">
    <div class="brand">
      <span class="logo" aria-hidden="true">
        <svg viewBox="0 0 24 24"><g fill="#06231c">
          <rect x="2" y="8.5" width="2.8" height="7" rx="1.2"/>
          <rect x="4.8" y="6.5" width="2.6" height="11" rx="1.2"/>
          <rect x="16.6" y="6.5" width="2.6" height="11" rx="1.2"/>
          <rect x="19.2" y="8.5" width="2.8" height="7" rx="1.2"/>
          <rect x="7.4" y="10.6" width="9.2" height="2.8" rx="1.4"/>
        </g></svg>
      </span>
      <div>
        <h1>Meu Treino</h1>
        <p id="subtitle">Carregando…</p>
      </div>
    </div>
    <div class="backup-actions">
      <button id="acctBtn" onclick="openAccount()" title="Conta e sincronização">☁︎</button>
      <button onclick="exportData()" title="Salvar uma cópia do histórico">⬇︎ Backup</button>
      <button onclick="document.getElementById('importFile').click()" title="Restaurar de um backup">⬆︎</button>
    </div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" id="tab-treino" onclick="setTab('treino')">Treino</div>
  <div class="tab" id="tab-plano" onclick="setTab('plano')">Plano</div>
  <div class="tab" id="tab-habitos" onclick="setTab('habitos')">Hábitos</div>
  <div class="tab" id="tab-agenda" onclick="setTab('agenda')">Agenda</div>
</div>

<div class="timer-bar" id="timerBar">
  <div class="tmr">
    <div class="tmr-label">Cronômetro</div>
    <div class="tmr-time" id="woDisplay">00:00</div>
    <button class="tmr-btn" id="woBtn" onclick="toggleWorkout()">Iniciar</button>
  </div>
  <div class="tmr">
    <div class="tmr-label">Descanso</div>
    <div class="tmr-time" id="restDisplay">00:00</div>
    <div class="rest-presets">
      <button onclick="startRest(60)">1:00</button>
      <button onclick="startRest(90)">1:30</button>
      <button onclick="startRest(120)">2:00</button>
      <button onclick="stopRest()">■</button>
    </div>
  </div>
</div>

<div class="container" id="groups"></div>
<div class="container" id="plano" style="display:none"></div>
<div class="container" id="habits" style="display:none"></div>
<div class="container" id="agenda" style="display:none"></div>

<div class="app-ver" id="appVer"></div>

<input type="file" id="importFile" accept="application/json,.json" style="display:none" onchange="importData(this)" />
<div class="toast" id="toast"></div>

<div class="acct-modal" id="acctModal">
  <div class="acct-box">
    <button class="acct-close" onclick="closeAccount()">×</button>
    <h3>Sincronização ☁︎</h3>
    <div id="acctBody"></div>
  </div>
</div>

<script src="./chart.umd.min.js"></script>
<script src="./supabase.min.js"></script>
<script>
const STORAGE_KEY = 'workout-data';
const APP_VERSION = '1.9'; // suba junto com o cache do sw.js a cada mudança
// --- Sincronização opcional (Supabase). Cole as 2 chaves do seu projeto: ---
const SUPABASE_URL  = 'https://wnvmghpioztfcbvzdris.supabase.co';
const SUPABASE_ANON = 'sb_publishable_GdTmIBCd8CBRtcghTWs_Jw_YlfeAbLZ'; // publishable key (pode ficar visível)
// tipos pré-definidos: força = séries/peso/reps · tempo = minutos
const PRESET_TYPES = [
  { name: 'Peito', kind: 'forca' },
  { name: 'Ombro', kind: 'forca' },
  { name: 'Tríceps', kind: 'forca' },
  { name: 'Perna', kind: 'forca' },
  { name: 'Abdômen', kind: 'forca' },
  { name: 'Bíceps', kind: 'forca' },
  { name: 'Costas Full', kind: 'forca' },
  { name: 'Costas Meio', kind: 'forca' },
  { name: 'Cardio', kind: 'tempo' }
];
let DATA = { groups: [], habits: [], habitChecks: {} };
const charts = {};
let agendaY = null, agendaM = null, selectedKey = null; // estado do calendário
let newHabitType = 'do';
let newHabitDays = [0,1,2,3,4,5,6]; // dias selecionados ao criar um hábito novo
const DAY_NAMES = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
let newTypeKind = 'tempo'; // tipo escolhido ao criar um treino novo

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) DATA = JSON.parse(raw);
  } catch (e) { /* primeira vez, sem dados */ }
  normalize();
  render();
}
function normalize() {
  if (!DATA || typeof DATA !== 'object') DATA = {};
  if (!Array.isArray(DATA.groups)) DATA.groups = [];
  // primeira vez: já vem com os tipos pré-definidos
  if (DATA.groups.length === 0 && !DATA._seeded) {
    DATA.groups = PRESET_TYPES.map(t => ({ id: uid(), name: t.name, kind: t.kind, exercises: [], logs: [] }));
    DATA._seeded = true;
    DATA.activeGroups = [];
  }
  DATA.groups.forEach(g => {
    g.kind = (g.kind === 'tempo') ? 'tempo' : 'forca';
    if (!Array.isArray(g.exercises)) g.exercises = [];
    if (!Array.isArray(g.logs)) g.logs = []; // logs de tempo (minutos) ficam no próprio tipo
    g.exercises.forEach(e => {
      if (!Array.isArray(e.logs)) e.logs = [];
      if (typeof e.targetSets !== 'number') {
        const l = e.logs[e.logs.length - 1];
        e.targetSets = l ? l.sets.length : 3; // séries padrão do plano
      }
    });
  });
  if (!Array.isArray(DATA.habits)) DATA.habits = [];
  DATA.habits.forEach(h => {
    // dias da semana em que o hábito vale (0=Dom … 6=Sáb); vazio/ausente = todo dia
    if (!Array.isArray(h.days) || h.days.length === 0) h.days = [0,1,2,3,4,5,6];
  });
  if (!DATA.habitChecks || typeof DATA.habitChecks !== 'object') DATA.habitChecks = {};
  // tipos selecionados pro treino de hoje; quem já tinha dados começa com todos
  if (!Array.isArray(DATA.activeGroups)) DATA.activeGroups = DATA.groups.map(g => g.id);
}
function dateKey(d) {
  const x = (d instanceof Date) ? d : new Date(d);
  return x.getFullYear() + '-' + String(x.getMonth()+1).padStart(2,'0') + '-' + String(x.getDate()).padStart(2,'0');
}
function parseKey(key) { const [y,m,d] = key.split('-').map(Number); return new Date(y, m-1, d); }
function save() {
  DATA.updatedAt = Date.now(); // marca a hora pra sincronização (quem é mais novo vence)
  persistLocal();
  schedulePush();
}
function persistLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); }
  catch (e) { toast('Erro ao salvar'); }
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1600);
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit' });
}

// ---- Backup ----
function exportData() {
  const blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  const stamp = d.getFullYear() + '-' +
    String(d.getMonth()+1).padStart(2,'0') + '-' +
    String(d.getDate()).padStart(2,'0');
  a.href = url;
  a.download = `meu-treino-backup-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Backup gerado ✓');
}
function importData(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const parsed = JSON.parse(reader.result);
      if (!parsed || !Array.isArray(parsed.groups)) throw new Error('formato');
      if (!confirm('Isto vai SUBSTITUIR todos os dados atuais pelos do backup. Continuar?')) return;
      DATA = parsed;
      normalize();
      save(); setTab(TAB); toast('Backup restaurado ✓');
    } catch (e) {
      toast('Arquivo inválido');
    } finally {
      input.value = '';
    }
  };
  reader.readAsText(file);
}

function addType(name, kind) {
  name = name.trim();
  if (!name) return false;
  if (DATA.groups.some(g => g.name.toLowerCase() === name.toLowerCase())) { toast('Esse tipo já existe'); return false; }
  const id = uid();
  DATA.groups.push({ id, name, kind, exercises: [], logs: [] });
  DATA.activeGroups.push(id); // já entra selecionado no treino de hoje
  save(); render();
  return true;
}
function addPreset(name, kind) { addType(name, kind); }
function setTypeKind(k) { newTypeKind = k; render(); }
function addCustomType() {
  const inp = document.getElementById('newType');
  if (addType(inp.value, newTypeKind)) inp.value = '';
}
function delGroup(gid) {
  const g = DATA.groups.find(x => x.id === gid);
  if (!confirm('Excluir "' + (g ? g.name : 'este tipo') + '" e todo o histórico dele?')) return;
  DATA.groups = DATA.groups.filter(g => g.id !== gid);
  DATA.activeGroups = DATA.activeGroups.filter(x => x !== gid);
  save(); render();
}
function toggleActive(gid) {
  const i = DATA.activeGroups.indexOf(gid);
  if (i >= 0) DATA.activeGroups.splice(i, 1);
  else DATA.activeGroups.push(gid);
  save(); render();
}
function addExercise(gid, inp) {
  const name = inp.value.trim();
  if (!name) return;
  const g = DATA.groups.find(x => x.id === gid);
  g.exercises.push({ id: uid(), name, logs: [], targetSets: 3 });
  inp.value = '';
  save(); renderActive();
}
function delExercise(gid, eid) {
  if (!confirm('Excluir este exercício?')) return;
  const g = DATA.groups.find(x => x.id === gid);
  g.exercises = g.exercises.filter(e => e.id !== eid);
  save(); renderActive();
}
function setTargetSets(eid, n) {
  const e = findEx(eid);
  e.targetSets = Math.max(1, Math.min(12, (e.targetSets || 3) + n));
  save(); renderPlano();
}
function renderActive() {
  if (TAB === 'plano') renderPlano();
  else if (TAB === 'habitos') renderHabits();
  else if (TAB === 'agenda') renderAgenda();
  else render();
}
function lastLog(e) { return e.logs[e.logs.length - 1]; }
function draftCount(e) {
  if (e._draftSets) return e._draftSets;
  if (typeof e.targetSets === 'number') return e.targetSets; // séries definidas no Plano
  const l = lastLog(e);
  return l ? l.sets.length : 3;
}
function setSeriesCount(eid, n) {
  const e = findEx(eid);
  e._draftSets = Math.max(1, Math.min(10, draftCount(e) + n));
  render();
}
function findEx(eid) {
  for (const g of DATA.groups) {
    const e = g.exercises.find(x => x.id === eid);
    if (e) return e;
  }
}
function saveLog(gid, eid) {
  const g = DATA.groups.find(x => x.id === gid);
  const e = g.exercises.find(x => x.id === eid);
  const count = draftCount(e);
  const sets = [];
  for (let i = 0; i < count; i++) {
    const w = parseFloat(document.getElementById(`w_${eid}_${i}`).value);
    const r = parseInt(document.getElementById(`rp_${eid}_${i}`).value);
    if (!isNaN(w)) sets.push({ carga: w, reps: isNaN(r)?null:r });
  }
  if (sets.length === 0) { toast('Informe ao menos uma carga'); return; }
  const note = document.getElementById('n_'+eid).value.trim();
  e.logs.push({ ts: Date.now(), sets, note });
  delete e._draftSets;
  save(); render(); toast('Registrado ✓');
}
function delLog(gid, eid, ts) {
  const g = DATA.groups.find(x => x.id === gid);
  const e = g.exercises.find(x => x.id === eid);
  e.logs = e.logs.filter(l => l.ts !== ts);
  save(); render();
}
function saveTimeLog(gid) {
  const g = DATA.groups.find(x => x.id === gid);
  const m = parseInt(document.getElementById('tm_' + gid).value);
  if (isNaN(m) || m <= 0) { toast('Informe os minutos'); return; }
  const note = document.getElementById('tn_' + gid).value.trim();
  g.logs.push({ ts: Date.now(), minutos: m, note });
  save(); render(); toast('Registrado ✓');
}
function delTimeLog(gid, ts) {
  const g = DATA.groups.find(x => x.id === gid);
  g.logs = g.logs.filter(l => l.ts !== ts);
  save(); render();
}

function render() {
  document.getElementById('subtitle').textContent =
    DATA.groups.length + ' tipos · ' + DATA.activeGroups.length + ' no treino de hoje';

  const wrap = document.getElementById('groups');
  const chips = DATA.groups.map(g => {
    const on = DATA.activeGroups.includes(g.id);
    return `<button class="chip ${on?'on':''}" onclick="toggleActive('${g.id}')">${esc(g.name)}${on?' ✓':''}</button>`;
  }).join('');
  const selected = DATA.groups.filter(g => DATA.activeGroups.includes(g.id));
  const cards = selected.length
    ? selected.map(g => groupCardHTML(g)).join('')
    : '<div class="empty">Toque nos tipos acima para montar o treino de hoje.</div>';

  const have = new Set(DATA.groups.map(g => g.name.toLowerCase()));
  const presetsLeft = PRESET_TYPES.filter(t => !have.has(t.name.toLowerCase()));
  const presetChips = presetsLeft.length
    ? `<div class="chips">${presetsLeft.map(t => `<button class="chip add" onclick="addPreset('${t.name}','${t.kind}')">+ ${esc(t.name)}</button>`).join('')}</div>`
    : '';
  const addSection = `
    <div class="add-type">
      <div class="pick-label">Adicionar tipo de treino</div>
      ${presetChips}
      <div class="new-type">
        <input id="newType" placeholder="Criar novo (ex: Boxe, Tênis)" onkeydown="if(event.key==='Enter')addCustomType()" />
        <div class="row2">
          <div class="seg">
            <button class="${newTypeKind==='forca'?'on':''}" onclick="setTypeKind('forca')">Musculação</button>
            <button class="${newTypeKind==='tempo'?'on':''}" onclick="setTypeKind('tempo')">Tempo</button>
          </div>
          <button class="add-habit-btn" onclick="addCustomType()">+</button>
        </div>
      </div>
    </div>`;

  wrap.innerHTML = `
    <div class="muscle-pick">
      <div class="pick-label">Treino de hoje — selecione os tipos</div>
      <div class="chips">${chips || '<span class="sub" style="color:var(--muted);font-size:13px">nenhum tipo ainda</span>'}</div>
    </div>
    ${cards}
    ${addSection}`;

  selected.forEach(g => g.kind !== 'tempo' && g.exercises.forEach(e => drawChart(e)));
}
function groupCardHTML(g) {
  let body;
  if (g.kind === 'tempo') body = timeCardHTML(g);
  else if (g.exercises.length) body = g.exercises.map(e => exerciseHTML(g, e)).join('');
  else body = '<div class="empty" style="padding:18px 8px">Nenhum exercício no plano.<br>Defina os exercícios na aba <b>Plano</b>.</div>';
  const sub = g.kind === 'tempo'
    ? `${g.logs.length} registros <span class="kind-badge">tempo</span>`
    : `${g.exercises.length} exercícios`;
  return `
    <div class="group-card open">
      <div class="group-head">
        <div class="left">
          <div>
            <h2>${esc(g.name)}</h2>
            <div class="count">${sub}</div>
          </div>
        </div>
        <button class="icon-btn" onclick="delGroup('${g.id}')">🗑</button>
      </div>
      <div class="group-body">${body}</div>
    </div>`;
}
function timeCardHTML(g) {
  const last = g.logs[g.logs.length - 1];
  const lastTxt = last ? `Última: ${last.minutos} min` : 'Sem registros ainda';
  const pm = last ? last.minutos : '';
  const hist = g.logs.slice().reverse().slice(0, 8).map(l => `
    <div class="hist-item">
      <span class="date">${fmtDate(l.ts)}</span>
      <span class="val">${l.minutos} min${l.note?' <span class="note">— '+esc(l.note)+'</span>':''}</span>
      <button class="hist-del" onclick="delTimeLog('${g.id}',${l.ts})">×</button>
    </div>`).join('');
  return `
    <div class="exercise">
      <div class="ex-head"><div><div class="ex-name">Duração</div><div class="ex-last">${lastTxt}</div></div></div>
      <div class="time-row">
        <input id="tm_${g.id}" type="number" inputmode="numeric" placeholder="minutos" value="${pm}" />
        <span class="time-unit">min</span>
      </div>
      <textarea id="tn_${g.id}" class="note-input" rows="1" placeholder="Anotações (opcional)"></textarea>
      <button class="save-btn" style="width:100%;margin-top:10px" onclick="saveTimeLog('${g.id}')">Registrar tempo</button>
      ${g.logs.length ? `<div class="history">${hist}</div>` : ''}
    </div>`;
}

function exerciseHTML(g, e) {
  const last = e.logs[e.logs.length-1];
  const lastTxt = last
    ? `Última: ${last.sets.length} séries · ${maxLoad(last)}kg máx`
    : 'Sem registros ainda';
  const count = draftCount(e);
  let setInputs = '<div class="set-head"><span>#</span><span>peso (kg)</span><span>reps</span></div>';
  for (let i = 0; i < count; i++) {
    const ls = last && last.sets[i];           // série correspondente da última vez
    const wv = ls != null ? ls.carga : '';
    const rv = ls != null && ls.reps != null ? ls.reps : '';
    setInputs += `
      <div class="set-line">
        <span class="set-idx">${i+1}</span>
        <input id="w_${e.id}_${i}" type="number" inputmode="decimal" placeholder="peso" value="${wv}" />
        <input id="rp_${e.id}_${i}" type="number" inputmode="numeric" placeholder="reps" value="${rv}" />
      </div>`;
  }
  const hist = e.logs.slice().reverse().slice(0,8).map(l => `
    <div class="hist-item">
      <span class="date">${fmtDate(l.ts)}</span>
      <span class="val">${l.sets.map(s => s.carga+(s.reps?'×'+s.reps:'')).join(' · ')}${l.note?' <span class="note">— '+esc(l.note)+'</span>':''}</span>
      <button class="hist-del" onclick="delLog('${g.id}','${e.id}',${l.ts})">×</button>
    </div>`).join('');
  return `
    <div class="exercise">
      <div class="ex-head">
        <div>
          <div class="ex-name">${esc(e.name)}</div>
          <div class="ex-last">${lastTxt}</div>
        </div>
        <div class="ex-actions">
          <button class="icon-btn" onclick="delExercise('${g.id}','${e.id}')">🗑</button>
        </div>
      </div>
      <div class="series-control">
        <span>Séries:</span>
        <div class="stepper">
          <button onclick="setSeriesCount('${e.id}',-1)">−</button>
          <div class="num">${count}</div>
          <button onclick="setSeriesCount('${e.id}',1)">+</button>
        </div>
      </div>
      ${setInputs}
      <textarea id="n_${e.id}" class="note-input" rows="1" placeholder="Anotações (opcional)"></textarea>
      <button class="save-btn" style="width:100%;margin-top:8px" onclick="saveLog('${g.id}','${e.id}')">Salvar treino</button>
      ${e.logs.length >= 2 ? `<div class="chart-wrap"><div class="chart-label">Evolução da carga máxima (kg)</div><canvas id="chart_${e.id}"></canvas></div>` : ''}
      ${e.logs.length ? `<div class="history">${hist}</div>` : ''}
    </div>`;
}
function maxLoad(log) { return Math.max(...log.sets.map(s => s.carga)); }

function drawChart(e) {
  if (e.logs.length < 2) return;
  const el = document.getElementById('chart_'+e.id);
  if (!el) return;
  if (charts[e.id]) charts[e.id].destroy();
  const pts = e.logs.slice().sort((a,b)=>a.ts-b.ts);
  charts[e.id] = new Chart(el, {
    type: 'line',
    data: {
      labels: pts.map(p => fmtDate(p.ts)),
      datasets: [{
        data: pts.map(p => maxLoad(p)),
        borderColor: '#5dcaa5',
        backgroundColor: 'rgba(93,202,165,0.12)',
        fill: true, tension: 0.25,
        pointRadius: 3, pointBackgroundColor: '#5dcaa5'
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: '#9aa0ab', font: {size: 10} }, grid: { display: false } },
        y: { ticks: { color: '#9aa0ab', font: {size: 10} }, grid: { color: '#2c313c' } }
      }
    }
  });
}

function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

let TAB = 'treino';
function setTab(t) {
  TAB = t;
  ['treino','plano','habitos','agenda'].forEach(x =>
    document.getElementById('tab-'+x).classList.toggle('active', x===t));
  document.getElementById('groups').style.display = t==='treino' ? '' : 'none';
  document.getElementById('plano').style.display = t==='plano' ? '' : 'none';
  document.getElementById('habits').style.display = t==='habitos' ? '' : 'none';
  document.getElementById('agenda').style.display = t==='agenda' ? '' : 'none';
  document.getElementById('timerBar').style.display = t==='treino' ? 'flex' : 'none';
  if (t==='agenda') renderAgenda();
  else if (t==='habitos') renderHabits();
  else if (t==='plano') renderPlano();
  else render();
}

// ---- Hábitos ----
function setHabitType(t) { newHabitType = t; renderHabits(); }
function habitDays(h) { return (Array.isArray(h.days) && h.days.length) ? h.days : [0,1,2,3,4,5,6]; }
function scheduledOn(h, wd) { return habitDays(h).includes(wd); }
function daysLabel(h) {
  const d = habitDays(h).slice().sort((a,b)=>a-b);
  if (d.length === 7) return 'Todo dia';
  if (d.length === 5 && [1,2,3,4,5].every(x=>d.includes(x))) return 'Dias úteis';
  if (d.length === 2 && d.includes(0) && d.includes(6)) return 'Fim de semana';
  return d.map(x => DAY_NAMES[x]).join(', ');
}
function dayChipsHTML(selected, onclickExpr, extraCls) {
  return `<div class="day-chips ${extraCls||''}">` +
    DAY_NAMES.map((n, i) =>
      `<div class="day-chip ${selected.includes(i)?'on':''}" onclick="${onclickExpr.replace('%d', i)}">${n}</div>`
    ).join('') + `</div>`;
}
function setNewHabitDays(preset) {
  if (preset === 'all') newHabitDays = [0,1,2,3,4,5,6];
  else if (preset === 'week') newHabitDays = [1,2,3,4,5];
  else if (preset === 'weekend') newHabitDays = [0,6];
  renderHabits();
}
function toggleNewHabitDay(d) {
  if (newHabitDays.includes(d)) newHabitDays = newHabitDays.filter(x => x !== d);
  else newHabitDays = newHabitDays.concat(d).sort((a,b)=>a-b);
  renderHabits();
}
function toggleHabitDay(hid, d) {
  const h = DATA.habits.find(x => x.id === hid);
  if (!h) return;
  let days = habitDays(h).slice();
  if (days.includes(d)) { if (days.length === 1) return; days = days.filter(x => x !== d); }
  else days = days.concat(d).sort((a,b)=>a-b);
  h.days = days;
  save(); renderHabits();
}
function addHabit() {
  const inp = document.getElementById('newHabit');
  const name = inp.value.trim();
  if (!name) return;
  const days = newHabitDays.length ? newHabitDays.slice() : [0,1,2,3,4,5,6];
  DATA.habits.push({ id: uid(), name, type: newHabitType, days });
  inp.value = '';
  save(); renderHabits();
}
function delHabit(hid) {
  if (!confirm('Excluir este hábito? O histórico de marcações dele também sai.')) return;
  DATA.habits = DATA.habits.filter(h => h.id !== hid);
  Object.keys(DATA.habitChecks).forEach(k => { if (DATA.habitChecks[k]) delete DATA.habitChecks[k][hid]; });
  save(); renderHabits();
}
function toggleHabit(hid, key) {
  if (!DATA.habitChecks[key]) DATA.habitChecks[key] = {};
  if (DATA.habitChecks[key][hid]) delete DATA.habitChecks[key][hid];
  else DATA.habitChecks[key][hid] = true;
  if (Object.keys(DATA.habitChecks[key]).length === 0) delete DATA.habitChecks[key];
  save();
  if (TAB === 'agenda') renderAgenda(); else renderHabits();
}
function habitStreak(hid) {
  const h = DATA.habits.find(x => x.id === hid);
  if (!h) return 0;
  let streak = 0;
  const d = new Date();
  // se hoje é dia agendado e ainda não marcado, começa de ontem — não quebra no meio do dia
  if (scheduledOn(h, d.getDay()) && !(DATA.habitChecks[dateKey(d)] && DATA.habitChecks[dateKey(d)][hid])) d.setDate(d.getDate() - 1);
  for (let i = 0; i < 400; i++) {
    if (scheduledOn(h, d.getDay())) {
      const k = dateKey(d);
      if (DATA.habitChecks[k] && DATA.habitChecks[k][hid]) streak++;
      else break;
    }
    d.setDate(d.getDate() - 1);
  }
  return streak;
}
function habitRow(h, key, compact, scheduled) {
  if (scheduled === undefined) scheduled = true;
  const done = !!(DATA.habitChecks[key] && DATA.habitChecks[key][h.id]);
  const st = compact ? 0 : habitStreak(h.id);
  const check = scheduled
    ? `<div class="habit-check ${done?'done':''}" onclick="toggleHabit('${h.id}','${key}')">${done?'✓':''}</div>`
    : `<div class="habit-check locked" title="Não agendado para este dia"></div>`;
  return `
    <div class="habit-row${compact?' compact':''}${scheduled?'':' off'}">
      ${check}
      <div class="habit-name">${esc(h.name)}</div>
      ${st>0?`<span class="streak">🔥 ${st}</span>`:''}
      <span class="habit-badge ${h.type}">${h.type==='do'?'Fazer':'Evitar'}</span>
      ${compact?`<span class="habit-badge" style="background:var(--surface);color:var(--muted)">${daysLabel(h)}</span>`:`<button class="icon-btn" onclick="delHabit('${h.id}')">🗑</button>`}
      ${compact?'':dayChipsHTML(habitDays(h), `toggleHabitDay('${h.id}',%d)`)}
    </div>`;
}
function renderHabits() {
  const wrap = document.getElementById('habits');
  const now = new Date();
  const today = dateKey(now);
  const wd = now.getDay();
  const todayFull = now.toLocaleDateString('pt-BR', { weekday:'long', day:'2-digit', month:'long' });
  const checks = DATA.habitChecks[today] || {};
  const todayHabits = DATA.habits.filter(h => scheduledOn(h, wd));
  const otherHabits = DATA.habits.filter(h => !scheduledOn(h, wd));
  const doneCount = todayHabits.filter(h => checks[h.id]).length;
  const rows = todayHabits.map(h => habitRow(h, today, false, true)).join('');
  const otherRows = otherHabits.map(h => habitRow(h, today, false, false)).join('');
  let body;
  if (!DATA.habits.length) {
    body = '<div class="empty">Nenhum hábito ainda.<br>Adicione hábitos que você quer manter (Fazer) ou cortar (Evitar) abaixo.</div>';
  } else if (!todayHabits.length) {
    body = '<div class="empty">Nenhum hábito agendado para hoje. 😌</div>';
  } else {
    body = rows;
  }
  wrap.innerHTML = `
    <h3 style="margin:4px 0 2px;font-size:16px">Hoje <span style="color:var(--muted);font-weight:400;font-size:13px">· ${cap(todayFull)}</span></h3>
    <p style="margin:0 0 12px;color:var(--muted);font-size:13px">${todayHabits.length ? doneCount+' de '+todayHabits.length+' hábitos de hoje' : (DATA.habits.length ? 'Dia de folga 🎉' : 'Crie seus hábitos abaixo')}</p>
    ${body}
    ${otherRows ? `<div class="detail-label" style="margin-top:18px">Outros dias</div>${otherRows}` : ''}
    <div class="habit-add">
      <input id="newHabit" placeholder="Novo hábito (ex: Beber 2L de água)" onkeydown="if(event.key==='Enter')addHabit()" />
      <div class="row2">
        <div class="seg">
          <button class="${newHabitType==='do'?'on':''}" onclick="setHabitType('do')">Fazer</button>
          <button class="${newHabitType==='avoid'?'on avoid':''}" onclick="setHabitType('avoid')">Evitar</button>
        </div>
        <button class="add-habit-btn" onclick="addHabit()">+</button>
      </div>
      <div class="day-presets">
        <button onclick="setNewHabitDays('all')">Todo dia</button>
        <button onclick="setNewHabitDays('week')">Dias úteis</button>
        <button onclick="setNewHabitDays('weekend')">Fim de semana</button>
      </div>
      ${dayChipsHTML(newHabitDays, 'toggleNewHabitDay(%d)', 'add-chips')}
    </div>`;
}

    : '<div class="empty">Nenhum tipo de musculação ainda.<br>Crie ou selecione tipos na aba <b>Treino</b>.</div>';

    ? `<div class="pick-label" style="margin-top:18px">Por tempo (sem exercícios)</div>
       <div class="chips">${tempo.map(g => `<span class="chip on" style="cursor:default">${esc(g.name)}</span>`).join('')}</div>`

    <p style="margin:4px 0 14px;color:var(--muted);font-size:13px">Monte o treino padrão de cada músculo: os exercícios e quantas séries. Na aba <b>Treino</b> você só preenche os pesos.</p>
    ${cards}${tempoNote}`;
}
function planoCardHTML(g) {

}

// ---- Timers (Treino) ----
let woStart = null, woInt = null;
let restEnd = null, restInt = null, audioCtx = null;
function fmtClock(s) {
  s = Math.max(0, Math.round(s));
  return String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0');
}
function toggleWorkout() {
  const btn = document.getElementById('woBtn');
  if (woStart === null) {
    woStart = Date.now();
    btn.textContent = 'Finalizar'; btn.classList.add('on');
    woInt = setInterval(tickWorkout, 1000); tickWorkout();
  } else {
    const mins = Math.round((Date.now() - woStart) / 60000);
    clearInterval(woInt); woInt = null; woStart = null;
    btn.textContent = 'Iniciar'; btn.classList.remove('on');
    document.getElementById('woDisplay').textContent = '00:00';
    toast('Treino: ' + mins + ' min 💪');
  }
}
function tickWorkout() {
  if (woStart === null) return;
  document.getElementById('woDisplay').textContent = fmtClock((Date.now() - woStart) / 1000);
}
function startRest(sec) {
  ensureAudio();
  restEnd = Date.now() + sec * 1000;
  if (restInt) clearInterval(restInt);
  document.getElementById('restDisplay').classList.remove('done');
  restInt = setInterval(tickRest, 200); tickRest();
}
function stopRest() {
  if (restInt) clearInterval(restInt);
  restInt = null; restEnd = null;
  const d = document.getElementById('restDisplay');
  d.textContent = '00:00'; d.classList.remove('done');
}
function tickRest() {
  if (restEnd === null) return;
  const remain = (restEnd - Date.now()) / 1000;
  const d = document.getElementById('restDisplay');
  if (remain <= 0) {
    clearInterval(restInt); restInt = null; restEnd = null;
    d.textContent = '00:00'; d.classList.add('done');
    beep();
    setTimeout(() => d.classList.remove('done'), 2200);
  } else {
    d.textContent = fmtClock(remain);
  }
}
function ensureAudio() {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch (e) {}
}
function beep() {
  try {
    ensureAudio();
    for (let i = 0; i < 2; i++) {
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.value = 880;
      const t = audioCtx.currentTime + i * 0.3;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.35, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.25);
      o.start(t); o.stop(t + 0.26);
    }
  } catch (e) {}
  if (navigator.vibrate) navigator.vibrate([180, 70, 180]);
}

// ---- Calendário ----
function shiftMonth(n) {
  agendaM += n;
  if (agendaM < 0) { agendaM = 11; agendaY--; }
  if (agendaM > 11) { agendaM = 0; agendaY++; }
  renderAgenda();
}
function selectDay(key) { selectedKey = key; renderAgenda(); }

function workoutsByDay() {
  const map = {};
  DATA.groups.forEach(g => {
    if (g.kind === 'tempo') {
      g.logs.forEach(l => {
        const k = dateKey(l.ts);
        (map[k] = map[k] || []).push({ group: g.name, kind: 'tempo', minutos: l.minutos, note: l.note });
      });
    } else {
      g.exercises.forEach(e => e.logs.forEach(l => {
        const k = dateKey(l.ts);
        (map[k] = map[k] || []).push({ group: g.name, name: e.name, kind: 'forca', sets: l.sets, note: l.note });
      }));
    }
  });
  return map;
}
function renderAgenda() {
  const wrap = document.getElementById('agenda');
  const now = new Date();
  if (agendaY === null) { agendaY = now.getFullYear(); agendaM = now.getMonth(); }
  if (selectedKey === null) selectedKey = dateKey(now);

  const wByDay = workoutsByDay();
  const first = new Date(agendaY, agendaM, 1);
  const startWd = first.getDay();
  const daysInMonth = new Date(agendaY, agendaM + 1, 0).getDate();
  const monthLabel = first.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  const todayKey = dateKey(now);
  const totalHabits = DATA.habits.length;

  let cells = '';
  for (let i = 0; i < startWd; i++) cells += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const key = agendaY + '-' + String(agendaM + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
    const checks = DATA.habitChecks[key] || {};
    const cellWd = new Date(agendaY, agendaM, d).getDay();
    const dayHabits = DATA.habits.filter(h => scheduledOn(h, cellWd));
    const ratio = dayHabits.length ? dayHabits.filter(h => checks[h.id]).length / dayHabits.length : 0;
    const cls = ['cal-cell'];
    if (key === todayKey) cls.push('today');
    if (key === selectedKey) cls.push('selected');
    const wmark = wByDay[key] ? '<span class="wmark"></span>' : '';
    const bar = ratio > 0 ? `<span class="hbar" style="width:${Math.round(ratio*100)}%"></span>` : '';
    cells += `<div class="${cls.join(' ')}" onclick="selectDay('${key}')">${d}${wmark}${bar}</div>`;
  }
  const wd = ['D','S','T','Q','Q','S','S'].map(x => `<div class="cal-wd">${x}</div>`).join('');

  wrap.innerHTML = `
    <div class="cal-nav">
      <button onclick="shiftMonth(-1)">‹</button>
      <span class="month">${cap(monthLabel)}</span>
      <button onclick="shiftMonth(1)">›</button>
    </div>
    <div class="cal-grid">${wd}${cells}</div>
    <div class="cal-legend">
      <span><span class="lg-dot"></span> treino</span>
      ${totalHabits ? '<span><span class="lg-bar"></span> hábitos cumpridos</span>' : ''}
    </div>
    <div id="dayDetail"></div>`;
  renderDayDetail(wByDay);
}
function renderDayDetail(wByDay) {
  const el = document.getElementById('dayDetail');
  const d = parseKey(selectedKey);
  const weekday = d.toLocaleDateString('pt-BR', { weekday: 'long' });
  const full = d.toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  const items = wByDay[selectedKey] || [];
  const selWd = d.getDay();
  const dayHabits = DATA.habits.filter(h => scheduledOn(h, selWd));
  const habitRows = dayHabits.map(h => habitRow(h, selectedKey, true)).join('');
  const workoutHtml = items.length
    ? items.map(i => i.kind === 'tempo'
        ? `<div class="day-ex">
            <span class="grp">${esc(i.group)}</span><br>
            <span class="sets">${i.minutos} min</span>
            ${i.note?`<br><span class="sets" style="font-style:italic">${esc(i.note)}</span>`:''}
          </div>`
        : `<div class="day-ex">
            <span class="grp">${esc(i.group)}</span> · ${esc(i.name)}<br>
            <span class="sets">${i.sets.map(s => s.carga + (s.reps?'×'+s.reps:'') + ' kg').join('  ·  ')}</span>
            ${i.note?`<br><span class="sets" style="font-style:italic">${esc(i.note)}</span>`:''}
          </div>`).join('')
    : '<div class="day-sub" style="padding:6px 0">Sem treino registrado.</div>';
  el.innerHTML = `
    <div class="day-card" style="margin-top:16px">
      <h3>${cap(weekday)} <span class="day-sub">· ${full}</span></h3>
      ${dayHabits.length ? `<div class="detail-label">Hábitos</div>${habitRows}` : ''}
      <div class="detail-label">Treino</div>
      ${workoutHtml}
    </div>`;
}
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ---- Sincronização na nuvem (Supabase) ----
let sb = null, sbUser = null, sbChannel = null, pushTimer = null, syncState = 'off';
function syncEnabled() { return !!(window.supabase && SUPABASE_URL && !SUPABASE_URL.startsWith('COLE')); }
function setSync(state) { syncState = state; renderAccount(); }
function schedulePush() {
  if (!sb || !sbUser) return;
  clearTimeout(pushTimer);
  pushTimer = setTimeout(pushRemote, 1200); // junta várias edições num envio só
}
function initSync() {
  if (!syncEnabled()) { renderAccount(); return; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON, {
    auth: { persistSession: true, autoRefreshToken: true }
  });
  sb.auth.getSession().then(({ data }) => {
    sbUser = (data.session && data.session.user) || null;
    renderAccount();
    if (sbUser) { pullRemote(); subscribeRemote(); }
  });
  sb.auth.onAuthStateChange((_e, session) => {
    const was = sbUser && sbUser.id;
    sbUser = (session && session.user) || null;
    renderAccount();
    if (sbUser && sbUser.id !== was) { closeAccount(); pullRemote(); subscribeRemote(); }
  });
}
async function pullRemote() {
  if (!sb || !sbUser) return;
  setSync('sync');
  try {
    const { data, error } = await sb.from('app_data').select('data').eq('user_id', sbUser.id).maybeSingle();
    if (error) throw error;
    const remote = data && data.data;
    if (remote && (remote.updatedAt || 0) > (DATA.updatedAt || 0)) {
      DATA = remote; normalize(); persistLocal(); renderActive();
      toast('Dados sincronizados ✓');
    } else if (!remote || (DATA.updatedAt || 0) > (remote.updatedAt || 0)) {
      await pushRemote(); return; // primeira vez ou local mais novo → sobe
    }
    setSync('ok');
  } catch (e) { setSync('err'); }
}
async function pushRemote() {
  if (!sb || !sbUser) return;
  setSync('sync');
  try {
    const { error } = await sb.from('app_data')
      .upsert({ user_id: sbUser.id, data: DATA, updated_at: new Date().toISOString() });
    if (error) throw error;
    setSync('ok');
  } catch (e) { setSync('err'); }
}
function subscribeRemote() {
  if (!sb || !sbUser) return;
  if (sbChannel) sb.removeChannel(sbChannel);
  sbChannel = sb.channel('sync-' + sbUser.id)
    .on('postgres_changes',
      { event: '*', schema: 'public', table: 'app_data', filter: 'user_id=eq.' + sbUser.id },
      (payload) => {
        const remote = payload.new && payload.new.data;
        if (remote && (remote.updatedAt || 0) > (DATA.updatedAt || 0)) {
          DATA = remote; normalize(); persistLocal(); renderActive();
          toast('Atualizado de outro aparelho ✓');
        }
      })
    .subscribe();
}
// --- UI de conta / login ---
function openAccount() { document.getElementById('acctModal').style.display = 'flex'; renderAccount(); }
function closeAccount() { document.getElementById('acctModal').style.display = 'none'; }
async function doAuth(mode) {
  if (!sb) return;
  const email = document.getElementById('acctEmail').value.trim();
  const pass = document.getElementById('acctPass').value;
  if (!email || !pass) { toast('Preencha e-mail e senha'); return; }
  if (pass.length < 6) { toast('Senha de pelo menos 6 letras'); return; }
  setSync('sync');
  try {
    const res = mode === 'signup'
      ? await sb.auth.signUp({ email, password: pass })
      : await sb.auth.signInWithPassword({ email, password: pass });
    if (res.error) throw res.error;
    if (mode === 'signup' && !(res.data && res.data.session)) {
      toast('Confira seu e-mail pra confirmar a conta'); setSync('off'); return;
    }
    toast(mode === 'signup' ? 'Conta criada ✓' : 'Conectado ✓');
  } catch (e) {
    const msg = (e && e.message) || '';
    toast(/already|registered/i.test(msg) ? 'E-mail já existe — toque em Entrar'
        : /invalid/i.test(msg) ? 'E-mail ou senha incorretos' : 'Falhou — tente de novo');
    setSync(sbUser ? 'ok' : 'off');
  }
}
async function doLogout() {
  if (sbChannel && sb) { sb.removeChannel(sbChannel); sbChannel = null; }
  if (sb) await sb.auth.signOut();
  sbUser = null; setSync('off');
  toast('Desconectado');
}
function syncBadge() {
  return { off: '', sync: '⟳ sincronizando…', ok: '✓ sincronizado', err: '⚠︎ sem conexão' }[syncState] || '';
}
function renderAccount() {
  const btn = document.getElementById('acctBtn');
  if (btn) btn.classList.toggle('on', !!sbUser);
  const body = document.getElementById('acctBody');
  if (!body) return;
  if (!syncEnabled()) {
    body.innerHTML = `<p class="acct-msg">Sincronização ainda não configurada neste app.</p>`;
  } else if (sbUser) {
    body.innerHTML = `
      <p class="acct-msg">Conectado como<br><b>${esc(sbUser.email)}</b></p>
      <p class="acct-status">${syncBadge()}</p>
      <p class="acct-hint">Treino e hábitos sincronizam sozinhos entre os aparelhos logados nesta conta.</p>
      <button class="acct-btn ghost" onclick="doLogout()">Sair desta conta</button>`;
  } else {
    body.innerHTML = `
      <p class="acct-msg">Entre pra sincronizar treino e hábitos entre o celular e o computador.</p>
      <input id="acctEmail" type="email" placeholder="seu@email.com" autocomplete="email" />
      <input id="acctPass" type="password" placeholder="senha (mín. 6 letras)" autocomplete="current-password" />
      <button class="acct-btn" onclick="doAuth('login')">Entrar</button>
      <button class="acct-btn ghost" onclick="doAuth('signup')">Criar conta nova</button>`;
  }
}

// Service worker → funciona offline depois da 1ª abertura
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

document.getElementById('appVer').textContent = 'v' + APP_VERSION;
load();
